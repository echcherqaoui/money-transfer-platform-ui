<div
  class="card hover:shadow-md transition-shadow cursor-pointer"
  [routerLink]="['/transfers', transfer().id]"
>
  <div class="flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div
        [ngClass]="isSent() ? 'bg-danger-50' : 'bg-success-50'"
        class="p-3 rounded-full"
      >
        <svg
          class="w-6 h-6"
          [ngClass]="isSent() ? 'text-danger-600' : 'text-success-600'"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          @if (isSent()) {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 11l5-5m0 0l5 5m-5-5v12"
            />
          } @else {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 13l-5 5m0 0l-5-5m5 5V6"
            />
          }
        </svg>
      </div>
      <div>
        <p class="font-medium text-gray-900">
          {{ isSent() ? "Sent to" : "Received from" }}
        </p>
        <p class="text-sm text-gray-500">
          {{ isSent() ? transfer().receiverId : transfer().senderId }}
        </p>
      </div>
    </div>

    <div class="text-right">
      <p
        class="font-semibold text-lg"
        [ngClass]="isSent() ? 'text-danger-600' : 'text-success-600'"
      >
        {{ isSent() ? "-" : "+" }} {{ transfer().amount | currencyFormat }}       </p>
      <span
        [ngClass]="transfer().status | statusBadge"
        class="badge text-xs mt-1"
      >
        {{ transfer().status }}
      </span>
    </div>
  </div>
</div>
