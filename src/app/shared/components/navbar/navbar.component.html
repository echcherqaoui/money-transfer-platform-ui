<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <a routerLink="/dashboard" class="flex items-center space-x-2">
            <svg
              class="w-8 h-8 text-primary-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span class="text-xl font-bold text-gray-900">MoneyTransfer</span>
          </a>
        </div>

        <!-- Navigation Links -->
        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
          <a
            routerLink="/dashboard"
            routerLinkActive="border-primary-500 text-gray-900"
            [routerLinkActiveOptions]="{ exact: true }"
            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium"
          >
            Dashboard
          </a>
          <a
            routerLink="/transfers"
            routerLinkActive="border-primary-500 text-gray-900"
            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium"
          >
            Transfers
          </a>
          <a
            routerLink="/wallet"
            routerLinkActive="border-primary-500 text-gray-900"
            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium"
          >
            Wallet
          </a>
          @if (authService.hasRole("ADMIN")) {
            <a
              routerLink="/admin"
              routerLinkActive="border-primary-500 text-gray-900"
              class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium"
            >
              Admin
            </a>
          }
        </div>
      </div>

      <!-- User Menu -->
      <div class="flex items-center">
        @if (authService.user(); as user) {
          <div class="flex items-center space-x-4">
            <span class="text-sm text-gray-700">{{ user.email }}</span>
            <button (click)="logout()" class="btn btn-secondary text-sm">
              Logout
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
