<div class="card bg-gradient-to-br from-primary-500 to-primary-700 text-white">
  <div class="flex items-center justify-between">
    <div>
      <p class="text-primary-100 text-sm font-medium">Available Balance</p>
      <h2 class="text-4xl font-bold mt-2">
        {{ balance() | currencyFormat }}
      </h2>
    </div>
    <div class="bg-white/20 p-4 rounded-full">
      <svg
        class="w-10 h-10"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"
        />
      </svg>
    </div>
  </div>

  @if (showRealTimeIndicator()) {
    <div class="mt-4 flex items-center space-x-2 text-sm text-primary-100">
      <span class="relative flex h-2 w-2">
        <span
          class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"
        ></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
      </span>
      <span>Real-time updates active</span>
    </div>
  }
</div>
